
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: sdu
      POSTGRES_PASSWORD: sdu
      POSTGRES_DB: sdu_archive
    ports:
      - "${POSTGRES_HOST_PORT:-15433}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sdu -d sdu_archive"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "${MINIO_API_PORT:-19002}:9000"
      - "${MINIO_CONSOLE_PORT:-19003}:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://sdu:sdu@db:5432/sdu_archive
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_SECURE: "false"
      MINIO_BUCKET: documents
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env or environment}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin12345678}
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "${API_HOST_PORT:-18000}:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "${FRONTEND_HOST_PORT:-18080}:80"
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

volumes:
  db_data:
  minio_data:
