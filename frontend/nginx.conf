server_tokens off;

server {
    listen 80;
    client_max_body_size 100m;

    # ─── Security headers ───────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"                    always;
    add_header X-Frame-Options         "DENY"                       always;
    add_header X-XSS-Protection        "1; mode=block"              always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self';" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
        # SSE: disable buffering for streaming responses
        proxy_buffering off;
        proxy_set_header X-Accel-Buffering no;
        proxy_cache off;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
